name: Traffic Badge

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-traffic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch unique visitors
        run: |
          UNIQUES=$(curl -s \
            -H "Authorization: token ${{ secrets.TRAFFIC_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/psw-pwa/psw-pwa.github.io/traffic/views \
            | jq '.uniques')
          echo "{\"visitors\":$UNIQUES}" > traffic.json

      - name: Commit traffic.json
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add traffic.json
          git diff --cached --quiet || git commit -m 'chore: update visitor count'
          git push
